name: uninotify_project
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1
environment:
  sdk: ^3.5.4
dependencies:
  flutter:
    sdk: flutter
  # Navigation & UI helpers
  get: ^4.6.6
  # SVG support
  flutter_svg: ^2.0.9
  # Custom fonts
  google_fonts: ^6.1.0
  # Date & time formatting
  intl: ^0.18.1
  # Extra icons
  font_awesome_flutter: ^10.6.0
  # iOS style icons
  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  pdf: ^3.10.7
  printing: ^5.11.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  http: ^1.6.0
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1
  show_up_animation: ^2.1.2
  auto_animated: ^3.2.0
  flutter_polyline_points: ^3.1.0
  sqflite: ^2.4.2
  path: ^1.9.1
  qr_flutter: ^4.1.0
  grouped_list: ^6.0.0
  url_launcher: ^6.3.2
  dropdown_search: ^6.0.2
  badges: ^3.1.2
  fluttericon: ^2.0.0
  dartz: ^0.10.1
  google_sign_in: ^7.2.0
  responsive_builder: ^0.7.1
  image_pickers: ^2.0.6
  flutter_otp_text_field: ^1.5.1+1
  timelines: ^0.1.0
  excel: ^4.0.6
  lottie: ^3.3.0
  file_selector: ^1.0.3
  open_filex: ^4.4.0
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/Amiri-Regular.ttf
    - assets/lottie/

